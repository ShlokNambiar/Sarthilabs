<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Sarathi Labs</title>
    <meta name="description"
        content="Initiate Sequence. Contact Sarathi Labs for AI transformation, consulting, and autonomous agent deployment.">
    <meta property="og:title" content="Contact | Sarathi Labs">
    <meta property="og:description" content="Initiate Sequence. Contact Sarathi Labs for AI transformation.">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="page-transition-overlay active"></div>
    <div id="cursor-orb"></div>
    <div id="cursor-aura"></div>

    <div class="canvas-container">
        <canvas id="fluid-canvas"></canvas>
        <div class="aurora-blur aurora-1"></div>
        <div class="aurora-blur aurora-2"></div>
    </div>

    <nav>
        <a href="index.html" class="logo">
            <img src="SL.png" alt="Sarathi Labs">
            Sarathi Labs
        </a>
        <div class="nav-links">
            <a href="services">Intelligence</a>
            <a href="about">Philosophy</a>
            <a href="blog">Blog</a>
            <a href="contact" class="active">Contact</a>
        </div>
    </nav>

    <div class="container">
        <header class="page-header">
            <h1 class="page-title">Initiate <span class="fluid-text">Sequence</span></h1>
            <p class="subtext">Ready to integrate fluid intelligence into your ecosystem? Signal us.</p>
        </header>

        <div class="contact-wrapper">
            <form action="#" method="POST">
                <div class="form-group">
                    <input type="text" id="name" class="form-input" placeholder=" " required>
                    <label for="name" class="form-label">Identifier</label>
                </div>

                <div class="form-group">
                    <input type="email" id="email" class="form-input" placeholder=" " required>
                    <label for="email" class="form-label">Signal Frequency (Email)</label>
                </div>

                <div class="form-group">
                    <input type="text" id="company" class="form-input" placeholder=" ">
                    <label for="company" class="form-label">Entity Name</label>
                </div>

                <div class="form-group">
                    <input type="text" id="message" class="form-input" placeholder=" " required>
                    <label for="message" class="form-label">Transmission</label>
                </div>

                <button type="submit" class="btn-neon">Transmit</button>
            </form>

            <div class="contact-info">
                <div class="card">
                    <h3>Base Operations</h3>
                    <p>Mumbai, India</p>
                    <p style="margin-top: 20px; font-size: 0.8rem; opacity: 0.5;">SARATHI_LABS_HQ_V_2.0</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
